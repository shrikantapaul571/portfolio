<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Admin — Shrikanta Paul</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="styles/admin.css" />
  </head>
  <body>
    <!-- Not configured notice -->
    <div id="notConfigured" class="notice" style="display: none">
      <h1>Admin not set up yet</h1>
      <p>
        Paste your Firebase keys into <code>js/firebase-config.js</code>, then
        reload this page. See <code>SETUP_FIREBASE.md</code> for the steps.
      </p>
      <a href="index.html" class="back">&larr; Back to site</a>
    </div>

    <!-- Login -->
    <div id="loginScreen" class="login-screen">
      <form id="loginForm" class="login-box">
        <h1>Admin Login</h1>
        <input id="loginEmail" type="email" placeholder="Email" required />
        <input id="loginPassword" type="password" placeholder="Password" required />
        <button type="submit">Log in</button>
        <p id="loginError" class="login-error" style="display: none"></p>
        <a href="index.html" class="back">&larr; Back to site</a>
      </form>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="dashboard" style="display: none">
      <header class="admin-top">
        <span class="brand">Shrikanta<span>.</span> Admin</span>
        <div class="top-right">
          <span id="userEmail" class="who"></span>
          <button onclick="importSeed()" class="seed-btn">
            <i class="fas fa-database"></i> Import current content
          </button>
          <a href="index.html" target="_blank" class="view-btn">
            <i class="fas fa-up-right-from-square"></i> View site
          </a>
          <button id="logoutBtn" class="logout-btn">
            <i class="fas fa-right-from-bracket"></i> Log out
          </button>
        </div>
      </header>
      <main id="panels" class="panels"></main>
    </div>

    <div id="toast" class="toast"></div>

    <script type="module" src="js/admin.js"></script>
  </body>
</html>
